<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(155deg, #eef2f7 0%, #ffffff 55%);
    color: #0f172a;
    -webkit-font-smoothing: antialiased;
  }
  .card { width: 1200px; height: 630px; padding: 56px 64px; display: flex; flex-direction: column; }
  .kicker { text-transform: uppercase; letter-spacing: .18em; font-size: 17px; font-weight: 700; color: #2563eb; }
  .title { font-size: 76px; font-weight: 800; letter-spacing: -0.03em; margin-top: 10px; line-height: 1; }
  .title span { color: #2563eb; }
  .sub { font-size: 25px; color: #475569; margin-top: 16px; max-width: 1000px; line-height: 1.4; font-weight: 500; }
  .diagram { flex: 1; margin-top: 26px; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 10px 30px rgba(15,23,42,.08); display: flex; align-items: center; justify-content: center; padding: 22px 26px; }
  .diagram img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; font-size: 20px; }
  .foot .repo { font-family: 'JetBrains Mono', ui-monospace, monospace; color: #64748b; }
  .foot .who { font-weight: 700; color: #0f172a; }
</style>
</head>
<body>
  <div class="card">
    <div class="kicker">Enterprise RAG Engine · Built in Go</div>
    <div class="title">Omni<span>RAG</span></div>
    <div class="sub">Retrieval intelligence in the orchestration layer — swappable across ChromaDB · Qdrant · Pinecone · MongoDB</div>
    <div class="diagram"><img src="architecture.png" alt="OmniRAG data-flow diagram" /></div>
    <div class="foot">
      <span class="repo">github.com/dharmendrra/Omni-RAG</span>
      <span class="who">Dharmendra Yadav</span>
    </div>
  </div>
</body>
</html>
